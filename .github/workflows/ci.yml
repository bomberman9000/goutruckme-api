name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install deps
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # ── 2. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      BOT_TOKEN: test-token
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: test-secret-key-for-ci
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      ESCROW_ENABLED: "false"

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install deps
        run: uv sync --frozen

      - name: Run tests
        run: |
          uv run pytest tests/ -q --tb=short \
            --ignore=tests/test_feed_api.py \
            --ignore=tests/test_extractor_llm.py \
            --ignore=tests/test_subscriptions_api.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
          retention-days: 7

  # ── 3. Deploy (только main после тестов) ────────────────────────────────────
  deploy:
    name: Deploy → production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            set -e
            cd /root/deploy/goutruckme-git

            echo "=== git pull ==="
            git pull origin main

            echo "=== docker compose build & up ==="
            docker compose build --no-cache api bot
            docker compose up -d --no-deps api bot

            echo "=== health check ==="
            sleep 5
            curl -sf http://localhost:8001/health || (echo "Health check FAILED" && exit 1)

            echo "=== Deploy OK ==="

      - name: Notify success
        if: success()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.ADMIN_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ADMIN_CHAT_ID }}" \
            -d "text=✅ Deploy успешен%0ACommit: ${{ github.sha }}%0AАвтор: ${{ github.actor }}" || true

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.ADMIN_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ADMIN_CHAT_ID }}" \
            -d "text=🔴 Deploy УПАЛ%0ACommit: ${{ github.sha }}%0AАвтор: ${{ github.actor }}" || true
