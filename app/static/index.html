<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГрузПоток — Умная биржа грузоперевозок</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ГрузПоток">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta property="og:title" content="ГрузПоток">
    <meta name="twitter:title" content="ГрузПоток">
    
    
    <script>
    // ── Service Worker hard-off until shell stabilizes ─────────────────
    window.__GP_SHELL_VERSION = '20260320-shell-v4-nosw';
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
            try {
                const regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map((reg) => reg.unregister()));
                if (window.caches && typeof window.caches.keys === 'function') {
                    const keys = await window.caches.keys();
                    await Promise.all(
                        keys
                            .filter((key) => key.startsWith('gruzpotok-') || key.startsWith('workbox-'))
                            .map((key) => window.caches.delete(key))
                    );
                }
                localStorage.setItem('gp-shell-version', window.__GP_SHELL_VERSION);
            } catch (err) {
                console.warn('SW disable:', err);
            }
        });
    }
    </script>
</body></html>
