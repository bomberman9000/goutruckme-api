<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заявки</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="max-w-4xl mx-auto">
    <nav class="mb-6 flex gap-4 text-sm">
      <a href="/admin/applications" class="font-semibold text-gray-800">Заявки</a>
      <a href="/admin/deals" class="text-blue-600 hover:underline">Сделки (sync)</a>
      <a href="/admin/moderation" class="text-blue-600 hover:underline">Модерация</a>
    </nav>
    <h1 class="text-2xl font-semibold mb-4">Заявки</h1>
    <ul class="space-y-2">
      {% for app in applications %}
      <li>
        <a href="/admin/applications/{{ app.id }}" class="text-blue-600 underline">#{{ app.id }} — {{ app.doc_type }} ({{ app.status }})</a>
      </li>
      {% else %}
      <li class="text-gray-500">Нет заявок</li>
      {% endfor %}
    </ul>
  </div>
</body>
</html>
